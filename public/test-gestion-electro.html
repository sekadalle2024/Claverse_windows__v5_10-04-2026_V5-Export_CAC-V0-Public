<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Gestion Électro - Menu Sidebar</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .test-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .test-section h2 {
            color: #4285f4;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #result {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        code {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📂 Test Gestion Électro - Menu Sidebar</h1>

        <div class="test-section">
            <h2>1. Test de l'endpoint N8N</h2>
            <p style="color: rgba(255,255,255,0.6); margin-bottom: 15px;">
                Endpoint: <code>https://barow52161.app.n8n.cloud/webhook/scan-drive-http</code>
            </p>
            <button class="btn btn-primary" onclick="testEndpoint()">🔄 Tester</button>
            <button class="btn btn-secondary" onclick="clearResult()">🗑️ Effacer</button>
            <div id="result"></div>
        </div>

        <div class="test-section">
            <h2>2. Test du menu coulissant</h2>
            <button class="btn btn-primary" onclick="openMenu()">📂 Ouvrir</button>
            <button class="btn btn-secondary" onclick="closeMenu()">✕ Fermer</button>
        </div>

        <div class="test-section">
            <h2>3. Informations</h2>
            <p style="color: rgba(255,255,255,0.6); line-height: 1.8;">
                Script: <code>public/gestion-electro-menu.js</code><br>
                Ajoute un bouton "Gestion Électro" dans la sidebar après Database.
            </p>
        </div>
    </div>

    <script src="/gestion-electro-menu.js"></script>
    <script>
        const ENDPOINT = 'https://barow52161.app.n8n.cloud/webhook/scan-drive-http';

        function log(msg, type = 'info') {
            const result = document.getElementById('result');
            const color = type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#3b82f6';
            result.innerHTML += `<div style="color: ${color}; margin-bottom: 8px;">${msg}</div>`;
        }

        function clearResult() { document.getElementById('result').innerHTML = ''; }

        async function testEndpoint() {
            log('🔄 Appel endpoint...');
            try {
                const response = await fetch(ENDPOINT);
                const data = await response.json();
                const result = Array.isArray(data) ? data[0] : data;
                log('✅ Dossier: ' + (result.dossierCible?.nom || 'N/A'), 'success');
                log('📊 Fichiers: ' + (result.statistiques?.totalElements || 0), 'success');
            } catch (e) {
                log('❌ Erreur: ' + e.message, 'error');
            }
        }

        function openMenu() {
            if (window.gestionElectroMenu) window.gestionElectroMenu.open();
        }

        function closeMenu() {
            if (window.gestionElectroMenu) window.gestionElectroMenu.close();
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Document n8n_doc</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .loading-container {
            text-align: center;
            padding: 60px 40px;
        }

        .loading-spinner {
            font-size: 48px;
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .gdrive-frame {
            width: 100%;
            height: 800px;
            border: none;
        }
    </style>
</head>

<body>
    <div id="content">
        <div class="loading-container">
            <div class="loading-spinner">⏳</div>
            <h2>Chargement du document Google Drive...</h2>
            <p>Le document s'affiche ci-dessous via Google Docs Viewer</p>
        </div>

        <!-- Iframe Google Docs Viewer - Affiche le document publié -->
        <iframe class="gdrive-frame"
            src="https://docs.google.com/document/d/1qaymPK-_nfCYxDO8KVylijXvi11oSpr5zsEEhwTzz5I/pub?embedded=true"
            frameborder="0" allowfullscreen>
        </iframe>
    </div>

    <script>
        // Masquer le loader une fois l'iframe chargé
        document.querySelector('iframe').onload = function () {
            document.querySelector('.loading-container').style.display = 'none';
        };
    </script>
</body>

</html>
